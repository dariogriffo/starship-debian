name: Build starship for Debian

on:
  workflow_dispatch:
    inputs:
      starship_version:
        description: The version of starship to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, armhf, i386, riscv64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'
          - 'armhf'
          - 'i386'
          - 'riscv64'

permissions:
  contents: write

jobs:
  build-starship:
    name: Build Binary Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout starship-debian
        uses: actions/checkout@v4

      - name: Build starship
        run: ./build_debian.sh ${{ inputs.starship_version }} ${{ inputs.build_version }} ${{ inputs.architecture }} && ./build_ubuntu.sh ${{ inputs.starship_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-artifact
          path: starship_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout starship-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.starship_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            starship_*.dsc
            starship_*.orig.tar.gz
            starship_*.debian.tar.xz

  release-starship:
    name: Release starship for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-starship, build-src]
    steps:
      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binary-artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            starship_*.deb
            starship_*.dsc
            starship_*.orig.tar.gz
            starship_*.debian.tar.xz
          name: ${{ inputs.starship_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.starship_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
